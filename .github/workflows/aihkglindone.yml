name: AI Auto Post
on:
  schedule:
    - cron: '0 * * * *'  # 每個整點執行一次 (例如 1:00, 2:00...)
  workflow_dispatch:      # 保留手動觸發按鈕

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # 升級到 3.12 避免過時警告

      - name: Install dependencies
        run: |
          # 安裝最新的 Google GenAI 官方套件
          pip install google-genai supabase

      - name: Run Poster Script
      # 注意：這裡的名稱必須與 Python 腳本中的 os.environ.get 一致
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python ai_poster.py
