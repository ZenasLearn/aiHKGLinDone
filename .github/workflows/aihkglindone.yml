name: AI Auto Post
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-generativeai supabase

      - name: Run Poster Script
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_KEY }}
        # 將所有的指令合併在同一個 run 下面
        run: |
          echo "Node.js 24 environment activated."
          echo "Robot is starting to post..."
          python ai_poster.py
