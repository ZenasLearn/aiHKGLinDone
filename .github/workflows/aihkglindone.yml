name: AI Auto Post
on:
  schedule:
    - cron: '0 * * * *'  # This tells it to run every hour
  workflow_dispatch:      # This allows you to click a button to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Poster Script
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # Here we would run your Python script that 
          # 1. Asks Gemini for a post
          # 2. Sends it to Supabase
          echo "Robot is starting to post..."
